<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>goran.dotin on Instagram: "End-to-end WhatsApp return/exchange agent"</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-black: #000000;
      --border-gray: #262626;
      --text-white: #F5F5F5;
      --text-muted: #A8A8A8;
      --accent-blue: #0095F6;
      --accent-lime: #4ADE80;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-black);
      color: var(--text-white);
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    /* Outer Wrapper for Page Layout */
    .page-wrapper {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* Top Navigation bar mirroring Desktop IG */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .brand-title span {
      color: var(--accent-lime);
    }

    /* Split Pane Instagram Container */
    .instagram-post-container {
      background-color: #000000;
      border: 1px solid var(--border-gray);
      border-radius: 4px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      width: 100%;
      height: 780px; /* Locked desktop height */
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 900px) {
      .instagram-post-container {
        grid-template-columns: 1fr;
        height: auto;
        display: flex;
        flex-direction: column;
      }
    }

    /* Left Column - Media Viewer */
    .media-column {
      background-color: #050505;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      border-right: 1px solid var(--border-gray);
    }

    @media (max-width: 900px) {
      .media-column {
        height: auto;
        aspect-ratio: 4/5;
        border-right: none;
        border-bottom: 1px solid var(--border-gray);
      }
    }

    /* Slide Carousel Viewport */
    .ig-media-viewport {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .ig-carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.215, 0.61, 0.355, 1);
    }

    .ig-slide {
      flex: 0 0 100%; /* Force each slide to occupy exactly 100% of viewport width */
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      user-select: none;
    }

    .ig-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Guarantee entire slide is visible without any cropping */
    }

    /* Real IG Desktop Navigation Buttons */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: rgba(26, 26, 26, 0.8);
      border: none;
      color: #FFFFFF;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: opacity 0.25s, background-color 0.15s;
    }

    .carousel-btn:hover {
      background-color: rgba(40, 40, 40, 0.95);
    }

    .btn-prev {
      left: 1rem;
      opacity: 0; /* Hidden on slide 1 */
      pointer-events: none;
    }

    .btn-next {
      right: 1rem;
    }

    /* Slide dots overlaying the media */
    .ig-dots-container {
      position: absolute;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      align-items: center;
      z-index: 10;
      background-color: rgba(0, 0, 0, 0.25);
      padding: 6px 10px;
      border-radius: 20px;
    }

    .ig-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .ig-dot.active {
      background-color: #FFFFFF;
      transform: scale(1.2);
    }

    /* Right Column - Meta / Content pane */
    .meta-column {
      background-color: #000000;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    @media (max-width: 900px) {
      .meta-column {
        height: auto;
      }
    }

    /* Post Header */
    .post-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border-gray);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 2px;
      margin-right: 12px;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: #111111;
      border: 1.5px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent-lime);
    }

    .user-names {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .username-link {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-white);
      text-decoration: none;
    }

    .username-link:hover {
      opacity: 0.85;
    }

    .dot-separator {
      color: var(--text-muted);
      font-size: 0.5rem;
    }

    .follow-btn {
      color: var(--accent-blue);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
    }

    .follow-btn:hover {
      color: #FFFFFF;
    }

    .header-more {
      font-size: 1.25rem;
      color: var(--text-white);
      cursor: pointer;
      margin-left: auto;
      padding-left: 8px;
    }

    /* Scrollable Comments & Caption Area */
    .comments-feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      border-bottom: 1px solid var(--border-gray);
      scrollbar-width: thin;
      scrollbar-color: #363636 #000000;
    }

    .comments-feed::-webkit-scrollbar {
      width: 6px;
    }

    .comments-feed::-webkit-scrollbar-thumb {
      background-color: #363636;
      border-radius: 10px;
    }

    .caption-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.45;
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    .caption-text-box {
      color: #E6E6E6;
    }

    .caption-user {
      font-weight: 700;
      color: var(--text-white);
      margin-right: 6px;
      text-decoration: none;
    }

    .caption-body {
      white-space: pre-wrap;
    }

    .hashtag {
      color: #E0F1FF;
      text-decoration: none;
    }

    .hashtag:hover {
      text-decoration: underline;
    }

    /* Bottom Interactive Box */
    .interaction-pane {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-gray);
    }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .action-group-left {
      display: flex;
      gap: 16px;
    }

    .action-icon-btn {
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-white);
      transition: color 0.15s;
    }

    .action-icon-btn:hover {
      color: var(--accent-lime);
    }

    .likes-count {
      font-size: 0.88rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .timestamp {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    /* Add Comment Bar */
    .add-comment-bar {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .smiley-icon {
      font-size: 1.35rem;
      color: var(--text-muted);
      cursor: pointer;
    }

    .comment-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-white);
      font-size: 0.88rem;
      outline: none;
    }

    .comment-input::placeholder {
      color: var(--text-muted);
    }

    .post-comment-btn {
      color: var(--accent-blue);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
      opacity: 0.5;
      pointer-events: none;
    }

    .comment-input:not(:placeholder-shown) + .post-comment-btn {
      opacity: 1;
      pointer-events: auto;
    }

    /* Quick Copy Overlay Notification */
    .copy-notification {
      background-color: var(--accent-lime);
      color: #000000;
      font-weight: 700;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: none;
      font-size: 0.85rem;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>

  <div class="copy-notification" id="copy-toast">Caption copied to clipboard! 📋</div>

  <div class="page-wrapper">
    
    <!-- Top Bar -->
    <div class="top-nav">
      <div class="brand-title">GoRan <span>AI Agency</span></div>
      <button class="follow-btn" onclick="copyCaption()" style="border: 1px solid var(--border-gray); padding: 5px 12px; border-radius: 4px; background: #121212;">📋 Copy Caption</button>
    </div>

    <!-- Instagram Container Mockup -->
    <div class="instagram-post-container">
      
      <!-- Left: Media Viewport & Swipe Carousels -->
      <div class="media-column">
        <div class="ig-media-viewport">
          
          <button class="carousel-btn btn-prev" id="prev-btn" onclick="moveSlide(-1)">❮</button>
          <button class="carousel-btn btn-next" id="next-btn" onclick="moveSlide(1)">❯</button>
          
          <div class="ig-carousel-track" id="carousel-track">
            <div class="ig-slide"><img src="slide_01.png"></div>
<div class="ig-slide"><img src="slide_02.png"></div>
<div class="ig-slide"><img src="slide_03.png"></div>
<div class="ig-slide"><img src="slide_04.png"></div>
<div class="ig-slide"><img src="slide_05.png"></div>
<div class="ig-slide"><img src="slide_06.png"></div>

          </div>
          
          <!-- Page dots overlay -->
          <div class="ig-dots-container">
            <span class="dot active" onclick="currentSlide(1)"></span>
<span class="dot " onclick="currentSlide(2)"></span>
<span class="dot " onclick="currentSlide(3)"></span>
<span class="dot " onclick="currentSlide(4)"></span>
<span class="dot " onclick="currentSlide(5)"></span>
<span class="dot " onclick="currentSlide(6)"></span>

          </div>
          
        </div>
      </div>

      <!-- Right: Meta Content Panel -->
      <div class="meta-column">
        
        <!-- Header -->
        <div class="post-header">
          <div class="user-avatar">
            <div class="avatar-inner">GR</div>
          </div>
          <div class="user-names">
            <a href="#" class="username-link">goran.dotin</a>
            <span class="dot-separator">●</span>
            <button class="follow-btn">Follow</button>
          </div>
          <div class="header-more">•••</div>
        </div>

        <!-- Comments Feed containing Caption -->
        <div class="comments-feed">
          <div class="caption-item">
            <div class="user-avatar" style="margin-right: 0; width: 28px; height: 28px;">
              <div class="avatar-inner" style="font-size: 0.55rem;">GR</div>
            </div>
            <div class="caption-text-box">
              <a href="#" class="caption-user">goran.dotin</a>
              <span class="caption-body" id="caption-content">Day 4 of 50 Days AI Automation for D2C Brands 🚀

Self-serve return & exchange agent on WhatsApp. Reduce refund support inquiries by 90% automatically.</span>
            </div>
          </div>
        </div>

        <!-- Interaction Pane -->
        <div class="interaction-pane">
          <div class="action-row">
            <div class="action-group-left">
              <span class="action-icon-btn" onclick="toggleLike(this)">🤍</span>
              <span class="action-icon-btn" onclick="focusCommentInput()">💬</span>
              <span class="action-icon-btn" onclick="alert('Direct Link Shared!')">✈️</span>
            </div>
            <span class="action-icon-btn" onclick="toggleSave(this)">🔖</span>
          </div>
          <div class="likes-count" id="likes-text">1,245 likes</div>
          <div class="timestamp">May 27, 2026</div>
        </div>

        <!-- Add Comment -->
        <div class="add-comment-bar">
          <span class="smiley-icon">😀</span>
          <input type="text" class="comment-input" id="c-input" placeholder="Add a comment..." oninput="checkCommentInput()">
          <button class="post-comment-btn" onclick="submitComment()">Post</button>
        </div>

      </div>

    </div>

  </div>

  <script>
    let currentSlide = 0;
    const totalSlides = 6;
    const track = document.getElementById('carousel-track');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const dots = document.querySelectorAll('.ig-dot');

    function updateCarousel() {
      // Solid 100% sliding offsets using flex-basis positioning
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      
      // Update dot classes
      dots.forEach((dot, index) => {
        if (index === currentSlide) {
          dot.classList.add('active');
        } else {
          dot.classList.remove('active');
        }
      });

      // Manage navigation arrow visibilities exactly like Instagram
      if (currentSlide === 0) {
        prevBtn.style.opacity = '0';
        prevBtn.style.pointerEvents = 'none';
      } else {
        prevBtn.style.opacity = '1';
        prevBtn.style.pointerEvents = 'auto';
      }

      if (currentSlide === totalSlides - 1) {
        nextBtn.style.opacity = '0';
        nextBtn.style.pointerEvents = 'none';
      } else {
        nextBtn.style.opacity = '1';
        nextBtn.style.pointerEvents = 'auto';
      }
    }

    function moveSlide(direction) {
      currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
      updateCarousel();
    }

    function jumpToSlide(slideIndex) {
      currentSlide = slideIndex;
      updateCarousel();
    }

    function copyCaption() {
      const captionText = document.getElementById('caption-content').innerText;
      navigator.clipboard.writeText(captionText).then(() => {
        const toast = document.getElementById('copy-toast');
        toast.style.display = 'block';
        setTimeout(() => {
          toast.style.display = 'none';
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy text: ', err);
      });
    }

    function toggleLike(btn) {
      const likesText = document.getElementById('likes-text');
      if (btn.textContent === '🤍') {
        btn.textContent = '❤️';
        btn.style.color = '#FF3040';
        likesText.textContent = '1,246 likes';
      } else {
        btn.textContent = '🤍';
        btn.style.color = 'var(--text-white)';
        likesText.textContent = '1,245 likes';
      }
    }

    function toggleSave(btn) {
      if (btn.textContent === '🔖') {
        btn.textContent = '🖤';
        btn.style.color = '#FFFFFF';
      } else {
        btn.textContent = '🔖';
        btn.style.color = 'var(--text-white)';
      }
    }

    function focusCommentInput() {
      document.getElementById('c-input').focus();
    }

    function checkCommentInput() {
      // Input listening handled via CSS condition triggers
    }

    function submitComment() {
      const input = document.getElementById('c-input');
      alert(`Comment successfully posted: "${input.value}"`);
      input.value = '';
    }

    // Initial load
    updateCarousel();
  </script>
</body>
</html>
