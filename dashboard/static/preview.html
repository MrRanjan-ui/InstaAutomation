<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Preview — GoRan AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Preview page specific layout overrides */
        .preview-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
            min-height: calc(100vh - 5rem);
        }
        
        .slide-viewer-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: fit-content;
        }

        .active-slide-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            aspect-ratio: 4/5; /* Instagram portrait aspect ratio */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .active-slide-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .active-slide-placeholder {
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        .slide-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        .slide-indicator {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .slides-filmstrip {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding: 0.5rem 0;
            border-top: 1px solid var(--card-border);
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        .filmstrip-thumb {
            width: 80px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .filmstrip-thumb:hover {
            opacity: 0.9;
        }

        .filmstrip-thumb.active {
            border-color: var(--accent-lime);
            opacity: 1;
            transform: scale(1.05);
        }

        .caption-textarea {
            width: 100%;
            min-height: 250px;
            resize: vertical;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .copy-success-toast {
            display: inline-block;
            background: var(--success-bg);
            color: #34d399;
            border: 1px solid var(--success-border);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-left: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .copy-success-toast.show {
            opacity: 1;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .meta-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 0.75rem;
        }

        .meta-box span {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .meta-box strong {
            font-size: 0.9rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div style="padding: 2.5rem; max-width: 1400px; margin: 0 auto; min-height: 100vh;">
        <!-- Header -->
        <header class="preview-header">
            <div>
                <a href="/" class="back-link">← Back to Dashboard</a>
                <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.2rem; font-weight: 800; margin-top: 0.5rem;" id="post-topic">Loading Post Preview...</h1>
                <p style="color: var(--text-secondary);" id="post-subtitle">Loading metadata...</p>
            </div>
            <div>
                <span class="badge" id="post-status">Loading...</span>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="preview-layout">
            <!-- Left Pane: Slide Viewer -->
            <div class="card slide-viewer-card">
                <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.25rem;">Slides Preview</h2>
                
                <div class="active-slide-container" id="active-slide-frame">
                    <!-- Loaded dynamically -->
                    <div class="active-slide-placeholder">Loading slide assets...</div>
                </div>

                <div class="slide-controls">
                    <button class="btn secondary" id="prev-slide-btn" disabled>◀ Previous</button>
                    <span class="slide-indicator" id="slide-indicator">Slide 0 of 0</span>
                    <button class="btn secondary" id="next-slide-btn" disabled>Next ▶</button>
                </div>

                <div class="slides-filmstrip" id="filmstrip-container">
                    <!-- Filmstrip thumbnails loaded dynamically -->
                </div>
            </div>

            <!-- Right Pane: Caption & Schedule -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <!-- Caption Card -->
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.25rem;">Caption & Text Copy</h2>
                        <div>
                            <button class="btn secondary" id="copy-caption-btn" style="padding: 0.4rem 0.8rem;">📋 Copy</button>
                            <span class="copy-success-toast" id="copy-toast">Copied!</span>
                        </div>
                    </div>
                    <textarea class="glass-input caption-textarea" id="caption-content" readonly></textarea>
                </div>

                <!-- Quick Action / Schedule Card -->
                <div class="card">
                    <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.25rem; margin-bottom: 1rem;">Schedule or Publish</h2>
                    
                    <div class="meta-grid">
                        <div class="meta-box">
                            <span>Source Sheet</span>
                            <strong id="meta-source">-</strong>
                        </div>
                        <div class="meta-box">
                            <span>Row Index</span>
                            <strong id="meta-row">-</strong>
                        </div>
                    </div>

                    <form id="schedule-form" class="modal-form" style="margin-top: 0;">
                        <div class="form-group row-flex">
                            <div class="flex-col">
                                <label for="schedule-type">Schedule Type</label>
                                <select id="schedule-type" class="glass-input">
                                    <option value="now">Post Now (Immediate)</option>
                                    <option value="later">Post at Specific Time</option>
                                </select>
                            </div>
                            
                            <div class="flex-col hidden" id="time-picker-wrapper">
                                <label for="schedule-datetime">Select Date & Time</label>
                                <input type="datetime-local" id="schedule-datetime" class="glass-input">
                            </div>
                        </div>
                        
                        <div class="form-actions" style="margin-top: 0.5rem;">
                            <button type="submit" class="btn primary" id="confirm-schedule-btn" style="width: 100%; justify-content: center;">
                                Confirm Schedule
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/preview.js"></script>
</body>
</html>
